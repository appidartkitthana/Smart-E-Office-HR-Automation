
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart E-Office | AdminLTE Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback" rel="stylesheet">
    <style>
        body {
            font-family: 'Source Sans Pro', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f9;
            color: #212529;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* AdminLTE Card Styles */
        .card {
            background: #fff;
            box-shadow: 0 0 1px rgba(0,0,0,.125), 0 1px 3px rgba(0,0,0,.2);
            margin-bottom: 1rem;
            border-radius: 0.25rem;
            border: 0 solid rgba(0,0,0,.125);
        }
        .card-header {
            background-color: transparent;
            border-bottom: 1px solid rgba(0,0,0,.125);
            padding: 0.75rem 1.25rem;
            position: relative;
            border-top-left-radius: 0.25rem;
            border-top-right-radius: 0.25rem;
        }
        .card-body { padding: 1.25rem; }
        .card-footer { padding: 0.75rem 1.25rem; background-color: rgba(0,0,0,.03); border-top: 0 solid rgba(0,0,0,.125); }

        /* Small Box Styles */
        .small-box {
            border-radius: 0.25rem;
            position: relative;
            display: block;
            margin-bottom: 20px;
            box-shadow: 0 0 1px rgba(0,0,0,.125), 0 1px 3px rgba(0,0,0,.2);
            color: #fff !important;
        }
        .small-box > .inner { padding: 10px; }
        .small-box h3 { font-size: 2.2rem; font-weight: 700; margin: 0 0 10px; white-space: nowrap; padding: 0; }
        .small-box p { font-size: 1rem; }
        .small-box .icon {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 0;
            font-size: 70px;
            color: rgba(0,0,0,.15);
        }

        /* AdminLTE Badge Styles */
        .badge { display: inline-block; padding: .25em .4em; font-size: 75%; font-weight: 700; line-height: 1; text-align: center; white-space: nowrap; vertical-align: baseline; border-radius: .25rem; }
        .bg-primary { background-color: #007bff !important; }
        .bg-success { background-color: #28a745 !important; }
        .bg-info { background-color: #17a2b8 !important; }
        .bg-warning { background-color: #ffc107 !important; }
        .bg-danger { background-color: #dc3545 !important; }
        
        /* Table AdminLTE */
        .table { width: 100%; margin-bottom: 1rem; color: #212529; background-color: transparent; border-collapse: collapse; }
        .table thead th { vertical-align: bottom; border-bottom: 2px solid #dee2e6; padding: .75rem; text-align: left; font-size: 0.9rem; }
        .table td { padding: .75rem; vertical-align: top; border-top: 1px solid #dee2e6; font-size: 0.875rem; }
        .table-striped tbody tr:nth-of-type(odd) { background-color: rgba(0,0,0,.05); }
    </style>
<script type="importmap">
{

    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",

  }
}
</script>

</head>

</body>
</html>
